<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jetpack Escape</title>

<style>
html,body{
    margin:0;
    overflow:hidden;
    background:#111;
    font-family:Arial,Helvetica,sans-serif;
}

canvas{
    display:block;
    background:linear-gradient(#233,#111);
}

#ui{
    position:absolute;
    left:20px;
    top:15px;
    color:white;
    font-size:22px;
    font-weight:bold;
    text-shadow:2px 2px 4px black;
}

#message{
    position:absolute;
    width:100%;
    top:40%;
    text-align:center;
    color:white;
    font-size:46px;
    font-weight:bold;
    display:none;
    text-shadow:3px 3px 6px black;
}
</style>
</head>
<body>

<div id="ui"></div>
<div id="message"></div>
<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.onresize=resize;

let running=true;
let thrust=false;

document.addEventListener("keydown",e=>{
if(e.code==="Space") thrust=true;

if(!running && e.code==="Space") restart();
});

document.addEventListener("keyup",e=>{
if(e.code==="Space") thrust=false;
});

canvas.addEventListener("pointerdown",()=>{
thrust=true;
if(!running) restart();
});

canvas.addEventListener("pointerup",()=>thrust=false);

const player={
x:140,
y:250,
w:42,
h:32,
vy:0
};

let particles=[];
let coins=[];
let lasers=[];

let score=0;
let high=localStorage.highscore||0;
let distance=0;
let speed=6;
let spawn=0;

function coin(y){
coins.push({
x:canvas.width+30,
y:y,
r:12
});
}

function laser(){
let gap=130+Math.random()*160;
let y=80+Math.random()*(canvas.height-gap-160);

lasers.push({
x:canvas.width+60,
y:y,
gap:gap,
w:36
});
}

function explode(){

for(let i=0;i<80;i++){

particles.push({
x:player.x,
y:player.y,
vx:(Math.random()-0.5)*12,
vy:(Math.random()-0.5)*12,
life:50,
size:3+Math.random()*5
});

}

}

function restart(){

running=true;
document.getElementById("message").style.display="none";

player.y=canvas.height/2;
player.vy=0;

coins=[];
lasers=[];
particles=[];

score=0;
distance=0;
speed=6;
spawn=0;

}

function collide(a,b){
return a.x<a.w+b.x &&
a.x+a.w>b.x &&
a.y<a.h+b.y &&
a.y+a.h>b.y;
}

function update(){

if(running){

speed+=0.0015;

player.vy+=0.55;

if(thrust){

player.vy-=1.1;

particles.push({
x:player.x-10,
y:player.y+player.h/2,
vx:-3-Math.random()*3,
vy:(Math.random()-0.5)*2,
life:20,
size:3+Math.random()*4
});

}

player.y+=player.vy;

distance++;

score=Math.floor(distance/10);

spawn++;

if(spawn>65){

spawn=0;

if(Math.random()<0.65){

coin(80+Math.random()*(canvas.height-160));

}else{

laser();

}

}

if(player.y<0 || player.y+player.h>canvas.height){

gameOver();

}

for(let i=coins.length-1;i>=0;i--){

let c=coins[i];

c.x-=speed;

if(c.x<-40) coins.splice(i,1);

let dx=(player.x+player.w/2)-c.x;
let dy=(player.y+player.h/2)-c.y;

if(Math.sqrt(dx*dx+dy*dy)<24){

coins.splice(i,1);
score+=50;

}

}

for(let i=lasers.length-1;i>=0;i--){

let l=lasers[i];

l.x-=speed;

if(l.x<-60){
lasers.splice(i,1);
continue;
}

let top={
x:l.x,
y:0,
w:l.w,
h:l.y
};

let bottom={
x:l.x,
y:l.y+l.gap,
w:l.w,
h:canvas.height
};

if(collide(player,top)||collide(player,bottom))
gameOver();

}

}

for(let i=particles.length-1;i>=0;i--){

let p=particles[i];

p.x+=p.vx;
p.y+=p.vy;
p.life--;

if(p.life<=0) particles.splice(i,1);

}

}

function gameOver(){

running=false;

explode();

high=Math.max(high,score);

localStorage.highscore=high;

const m=document.getElementById("message");
m.style.display="block";
m.innerHTML=
"GAME OVER<br><span style='font-size:26px'>Press SPACE or Tap</span>";

}

function drawPlayer(){

ctx.save();

ctx.translate(player.x,player.y);

ctx.fillStyle="#ffcc33";
ctx.fillRect(0,0,player.w,player.h);

ctx.fillStyle="#444";
ctx.fillRect(5,5,10,22);

ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(30,10,4,0,Math.PI*2);
ctx.fill();

ctx.restore();

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let x=-(distance%80);x<canvas.width;x+=80){

ctx.fillStyle="#1d1d1d";
ctx.fillRect(x,0,3,canvas.height);

}

ctx.fillStyle="#ff3030";

lasers.forEach(l=>{

ctx.fillRect(l.x,0,l.w,l.y);

ctx.fillRect(
l.x,
l.y+l.gap,
l.w,
canvas.height
);

});

coins.forEach(c=>{

ctx.beginPath();
ctx.fillStyle="gold";
ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
ctx.fill();

ctx.strokeStyle="#fff8";
ctx.stroke();

});

particles.forEach(p=>{

ctx.fillStyle="orange";
ctx.globalAlpha=p.life/20;

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();

ctx.globalAlpha=1;

});

drawPlayer();

document.getElementById("ui").innerHTML=
`Score: ${score}<br>High: ${high}`;

}

function loop(){

update();
draw();

requestAnimationFrame(loop);

}

restart();
loop();

</script>

</body>
</html>
